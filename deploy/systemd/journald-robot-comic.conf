# journald drop-in for robot_comic on Raspberry Pi 5
#
# Intent:
#   - Cap total journal storage to 500 MB so the SD card never fills up.
#   - Keep at least 1 GB of free space on the filesystem at all times.
#   - Rotate individual journal files at 50 MB (keeps recent logs reachable).
#   - Discard entries older than 2 weeks (enough history for debugging reboots).
#   - Disable forwarding to syslog (no rsyslog on the Pi; avoids double-write).
#
# Storage location:
#   With Storage=auto (journald default), journal entries are written to
#   /var/log/journal when that directory exists (persistent across reboots).
#   If it does NOT exist, journald falls back to /run/log/journal which is
#   RAM-backed tmpfs and is lost on every reboot.  Run the install script
#   (scripts/install-pi-journald.sh) which creates /var/log/journal so the
#   persistent path is always used.
#
# Install:
#   sudo ./scripts/install-pi-journald.sh
#
# Manual install (without the script):
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp deploy/systemd/journald-robot-comic.conf \
#       /etc/systemd/journald.conf.d/robot-comic.conf
#   sudo systemctl restart systemd-journald

[Journal]
SystemMaxUse=500M
SystemKeepFree=1G
SystemMaxFileSize=50M
MaxRetentionSec=2week
ForwardToSyslog=no
