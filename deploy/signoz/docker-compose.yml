# SigNoz on-demand observability stack — Pi 5 8 GB variant
#
# Trimmed from the official SigNoz v0.122.0 compose for single-node,
# on-demand use (no HA replication, no Kafka, USB-SSD data path).
#
# Usage:
#   docker compose up -d       # start
#   docker compose down -v     # stop + wipe volumes
#
# ClickHouse data is stored in Docker named volumes (see bottom).
# To redirect to a USB SSD, bind-mount the volume path instead:
#   clickhouse: { driver: local, driver_opts: { type: none, o: bind, device: /mnt/ssd/signoz/clickhouse } }

version: "3"

x-common: &common
  networks:
    - signoz-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

x-clickhouse-defaults: &clickhouse-defaults
  !!merge <<: *common
  # arm64-compatible ClickHouse image (Pi 5 = Cortex-A76 / ARMv8.3-A)
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1

x-db-depend: &db-depend
  !!merge <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy

services:
  # ── Bootstrap: download the histogram-quantile UDF binary ────────────────
  init-clickhouse:
    !!merge <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    restart: on-failure
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz \
          "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - clickhouse-user-scripts:/var/lib/clickhouse/user_scripts/

  # ── ZooKeeper (lightweight coordination, required by ClickHouse) ──────────
  zookeeper-1:
    !!merge <<: *common
    image: signoz/zookeeper:3.7.1
    container_name: signoz-zookeeper-1
    user: root
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    volumes:
      - zookeeper-1:/bitnami/zookeeper

  # ── ClickHouse (Pi 5–tuned: memory cap 2 GB, smaller caches) ─────────────
  clickhouse:
    !!merge <<: *clickhouse-defaults
    container_name: signoz-clickhouse
    volumes:
      - ./config/clickhouse-config.xml:/etc/clickhouse-server/config.xml
      - ./config/clickhouse-users.xml:/etc/clickhouse-server/users.xml
      - ./config/clickhouse-custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./config/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse-user-scripts:/var/lib/clickhouse/user_scripts/
      - clickhouse:/var/lib/clickhouse/

  # ── SigNoz UI + API ───────────────────────────────────────────────────────
  signoz:
    !!merge <<: *db-depend
    image: signoz/signoz:v0.122.0
    container_name: signoz
    ports:
      - "3301:8080"   # UI at http://reachy-mini:3301 (avoids clash with app's :8080)
    volumes:
      - sqlite:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=secret
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── OTel Collector (gRPC :4317, HTTP :4318) ───────────────────────────────
  otel-collector:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:v0.144.4
    container_name: signoz-otel-collector
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector \
          --config=/etc/otel-collector-config.yaml \
          --manager-config=/etc/manager-config.yaml \
          --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./config/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "4317:4317"   # OTLP gRPC — robot_comic sends traces here
      - "4318:4318"   # OTLP HTTP (optional)

  # ── Schema migrator (runs once, exits) ────────────────────────────────────
  signoz-telemetrystore-migrator:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:v0.144.4
    container_name: signoz-telemetrystore-migrator
    restart: on-failure
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up

networks:
  signoz-net:
    name: signoz-net

volumes:
  clickhouse:
    name: signoz-clickhouse
  clickhouse-user-scripts:
    name: signoz-clickhouse-user-scripts
  sqlite:
    name: signoz-sqlite
  zookeeper-1:
    name: signoz-zookeeper-1
