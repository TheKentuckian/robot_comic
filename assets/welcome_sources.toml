# Welcome Gate — per-comedian YouTube source config.
#
# For each real-comedian profile we extract a short "this is me saying my name"
# clip from YouTube. The phrases list matches both self-intros and host intros
# (first match wins), so a Tonight Show host saying "Don Rickles" also works.
#
# Schema:
#   url      = full YouTube URL
#   phrases  = list of lowercase phrases to scan for, in priority order
#   start    = optional "HH:MM:SS" — only transcribe from this point
#   end      = optional "HH:MM:SS" — only transcribe up to this point
#
# Narrowing the [start, end] window dramatically speeds up transcription.
# Default windows below cover the intro of each show (where names are spoken).

[don_rickles]
# Mr. Warmth: The Don Rickles Project (2007 documentary). John Landis narrates
# and says Rickles's name in the opener; Rickles intros himself too.
url = "https://www.youtube.com/watch?v=d4lI1sYCYmk"
phrases = ["i'm don rickles", "don rickles", "rickles"]
start = "00:00:00"
end = "00:05:00"

