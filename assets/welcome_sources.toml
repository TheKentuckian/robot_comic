# Welcome Gate — per-comedian YouTube source config.
#
# For each real-comedian profile we extract a short "this is me saying my name"
# clip from YouTube. Fill in `url` with a stand-up / interview clip where the
# comedian clearly says one of the configured phrases (first match wins).
#
# Schema:
#   url      = full YouTube URL
#   phrases  = list of lowercase phrases to scan for, in priority order
#   start    = optional "HH:MM:SS" — only transcribe from this point
#   end      = optional "HH:MM:SS" — only transcribe up to this point
#
# Narrowing the [start, end] window dramatically speeds up transcription.

[don_rickles]
url = ""  # TODO: fill in with a clip where Rickles says his name
phrases = ["i'm don rickles", "don rickles here", "don rickles", "rickles"]

