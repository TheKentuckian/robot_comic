# static_prompts.toml — Declarative manifest for all lifecycle static audio clips.
#
# Schema per entry:
#   category    = string — logical trigger category (startup, picker, persona_selected,
#                 persona_switch, pause, resume, shutdown, error)
#   scope       = "global" | "per_persona"
#   text        = the exact text to synthesize
#   output_path = repo-relative path for the generated WAV (never committed; see .gitignore)
#   generator   = "elevenlabs" | "xtts"  (default elevenlabs; xtts requires #438)
#   persona     = required when scope = "per_persona" — matches profiles/<persona>/
#
# Language: en (English-only for now; mark as TODO when multi-language support lands)
# TODO(i18n): add lang = "en" field once we grow into non-English personas.
#
# Regeneration: run  scripts/regenerate-static-prompts.py  to create missing clips.
# That script skips clips whose output_path already exists (idempotent).
# Do NOT commit any .wav files — see .gitignore patterns "assets/*/*.wav".
#
# ElevenLabs voice IDs are read from the persona's elevenlabs.txt / elevenlabs.local.txt
# at generation time.  The regenerator resolves them; they are NOT stored here.

# ---------------------------------------------------------------------------
# startup — played once on successful handler ready (after autostart)
# ---------------------------------------------------------------------------
# Small pool: one variant is chosen at random by the playback helper.

[[clips]]
category    = "startup"
scope       = "global"
text        = "Reachy Mini, online."
output_path = "assets/startup/online.wav"
generator   = "elevenlabs"

[[clips]]
category    = "startup"
scope       = "global"
text        = "Robot comic, booting up."
output_path = "assets/startup/booting_up.wav"
generator   = "elevenlabs"

