name: pytest-fast
# Fast required pytest gate (test-infra-3).
#
# Selects tests NOT marked `slow`, `integration`, or `hardware`. Runs
# under `pytest-xdist -n auto` (from `addopts` in pyproject.toml).
# Targeted wall-clock budget: 90 s for pytest itself (enforced by the
# "Enforce 90 s wall-clock budget" step). The job-level 15-minute
# timeout is a generous hard cap covering cold-cache install of heavy
# extras (face_recognition / dlib build, torch download).
#
# Required check on PRs. The full suite (`pytest-full`) runs in
# parallel as advisory + post-merge gate.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-fast:
    name: pytest-fast (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "120"

    steps:
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
        with:
          packages: libcairo2-dev libgirepository1.0-dev
          version: 1.0

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "No extra system packages required (using wheel-bundled libs)"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Set HF_HOME
        shell: bash
        run: |
          echo "HF_HOME=${RUNNER_TEMP}/.hf" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/.hf"

      - name: Cache Hugging Face hub
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ runner.temp }}/.hf
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: hf-${{ runner.os }}-

      - name: Create test .env
        shell: bash
        run: |
          printf "OPENAI_API_KEY=test-dummy\n" > .env

      - name: Install (frozen) – Linux / macOS
        if: runner.os != 'Windows'
        run: uv sync --frozen --all-extras --group dev

      - name: Install (frozen) – Windows (no mediapipe)
        if: runner.os == 'Windows'
        run: uv sync --frozen --extra local_vision --extra yolo_vision --group dev

      - name: Prefetch HF dataset (Linux)
        if: runner.os == 'Linux'
        run: |
          .venv/bin/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      - name: Prefetch HF dataset (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv/Scripts/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      # Run the fast subset. The 90-second budget guard runs AFTER pytest
      # using the elapsed time recorded by the shell, so a pytest failure
      # still surfaces first.
      - name: Run pytest (fast subset) – Linux
        if: runner.os == 'Linux'
        id: pytest-linux
        shell: bash
        run: |
          start=$(date +%s)
          .venv/bin/pytest tests/ -m "not slow and not integration and not hardware" -q --ignore=tests/vision/test_local_vision.py
          end=$(date +%s)
          elapsed=$((end - start))
          echo "pytest_elapsed_seconds=${elapsed}" >> "$GITHUB_OUTPUT"
          echo "pytest fast subset completed in ${elapsed}s"

      - name: Run pytest (fast subset) – Windows
        if: runner.os == 'Windows'
        id: pytest-windows
        shell: bash
        run: |
          start=$(date +%s)
          .venv/Scripts/pytest tests/ -m "not slow and not integration and not hardware" -q --ignore=tests/vision/test_local_vision.py
          end=$(date +%s)
          elapsed=$((end - start))
          echo "pytest_elapsed_seconds=${elapsed}" >> "$GITHUB_OUTPUT"
          echo "pytest fast subset completed in ${elapsed}s"

      - name: Enforce 90 s wall-clock budget
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            elapsed="${{ steps.pytest-linux.outputs.pytest_elapsed_seconds }}"
          else
            elapsed="${{ steps.pytest-windows.outputs.pytest_elapsed_seconds }}"
          fi
          echo "pytest-fast took ${elapsed}s (budget: 90s)"
          if [ "${elapsed}" -gt 90 ]; then
            echo "::error::pytest-fast exceeded 90 s budget (took ${elapsed}s). Investigate slowest tests with: pytest --durations=25"
            exit 1
          fi
