name: pytest-full
# Full pytest suite (test-infra-3).
#
# On `pull_request`: ADVISORY (continue-on-error). Visible in checks
# tab; does not block merge.
# On `push: branches: [main]`: GATING. On failure, opens a GitHub issue
# pinging the operator. Does NOT auto-revert.
#
# The fast subset (`pytest-fast`) is the required PR gate.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read
  actions: write
  # Required for the post-merge issue-creation step on the `push` trigger.
  # Read-only for the `pull_request` advisory path.
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-full:
    name: pytest-full (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # Advisory on PRs, gating on main. The `if` branch is mirrored in the
    # issue-creation step below so it only fires on main failures.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "120"

    steps:
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
        with:
          packages: libcairo2-dev libgirepository1.0-dev
          version: 1.0

      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "No extra system packages required (using wheel-bundled libs)"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Set HF_HOME
        shell: bash
        run: |
          echo "HF_HOME=${RUNNER_TEMP}/.hf" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/.hf"

      - name: Cache Hugging Face hub
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ runner.temp }}/.hf
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: hf-${{ runner.os }}-

      - name: Create test .env
        shell: bash
        run: |
          printf "OPENAI_API_KEY=test-dummy\n" > .env

      - name: Install (frozen) – Linux / macOS
        if: runner.os != 'Windows'
        run: uv sync --frozen --all-extras --group dev

      - name: Install (frozen) – Windows (no mediapipe)
        if: runner.os == 'Windows'
        run: uv sync --frozen --extra local_vision --extra yolo_vision --group dev

      - name: Prefetch HF dataset (Linux)
        if: runner.os == 'Linux'
        run: |
          .venv/bin/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      - name: Prefetch HF dataset (Windows)
        if: runner.os == 'Windows'
        run: |
          .venv/Scripts/python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='pollen-robotics/reachy-mini-emotions-library',
              repo_type='dataset',
              etag_timeout=120,
              max_workers=4,
          )
          "

      # Full suite minus `hardware` (real ALSA/serial/GPIO).
      - name: Run pytest (full) – Linux
        if: runner.os == 'Linux'
        run: .venv/bin/pytest tests/ -m "not hardware" -q --ignore=tests/vision/test_local_vision.py

      - name: Run pytest (full) – Windows
        if: runner.os == 'Windows'
        run: .venv/Scripts/pytest tests/ -m "not hardware" -q --ignore=tests/vision/test_local_vision.py

  # Post-merge gate: if the full suite failed on the `push: branches: [main]`
  # trigger, open a GitHub issue pinging the operator. PR failures are
  # advisory and never reach this job (the `if` filters them out).
  notify-main-failure:
    name: Open issue on post-merge failure
    needs: pytest-full
    if: always() && needs.pytest-full.result == 'failure' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `pytest-full failed on main @ ${sha}`;
            const body = [
              `The post-merge \`pytest-full\` gate failed on \`main\` at \`${sha}\`.`,
              ``,
              `Workflow run: ${runUrl}`,
              ``,
              `cc @TheKentuckian — notification only, no auto-revert. Decide whether to`,
              `revert the offending PR, fix-forward, or down-mark the failing test`,
              `as \`slow\` / \`integration\` if it is environmental.`,
              ``,
              `Note: \`pytest-fast\` runs the deselected-slow-and-integration subset`,
              `and is the merge-gating check, so this failure means the PR introduced`,
              `a regression in a \`slow\` / \`integration\` test that the fast gate did`,
              `not exercise — or an unmarked flake under \`-n auto\`.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'pytest-full-regression'],
            });
